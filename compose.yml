services:
  catalog:
    build:
      context: .
      dockerfile: kbeatz-catalog/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Required: absolute path to the FLAC library root (mounted read-write at /library)
      CATALOG_LIBRARY_ROOT: /library
      # Optional: override the JDBC connection URL (default: file-based H2)
      CATALOG_JDBC_URL: ${CATALOG_JDBC_URL:-}
      # Optional: database username (default: sa)
      CATALOG_DB_USER: ${CATALOG_DB_USER:-sa}
      # Optional: database password (default: empty)
      CATALOG_DB_PASSWORD: ${CATALOG_DB_PASSWORD:-}
      # Optional: runtime data directory for image quota tracking (default: ./data)
      CATALOG_DATA_DIR: ${CATALOG_DATA_DIR:-}
      # Optional: Discogs Personal Access Token; sync is unavailable without it
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
    volumes:
      - ${CATALOG_LIBRARY_ROOT:-/tmp/kbeatz-library}:/library:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  ui:
    build:
      context: kbeatz-ui
      dockerfile: Dockerfile
    ports:
      - "3005:80"
    depends_on:
      catalog:
        condition: service_healthy

  cli:
    build:
      context: .
      dockerfile: kbeatz-cli/Dockerfile
    environment:
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
      CATALOG_LIBRARY_ROOT: ${CATALOG_LIBRARY_ROOT:-/library}
    volumes:
      - ${CATALOG_LIBRARY_ROOT:-/tmp/kbeatz-library}:/library:rw
    profiles:
      - tools
