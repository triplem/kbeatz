# Test overrides: use an in-memory H2 database so no real DB or secrets are needed.
# This file is loaded in tests via AppConfig.fromConf("application-test.conf") or equivalent.
catalog {
  jdbcUrl     = "jdbc:h2:mem:kbeatz_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
  dbUser      = "sa"
  dbPassword  = ""
  libraryRoot = ${?CATALOG_LIBRARY_ROOT}
  dataDir     = "./data"
  discogs {
    token = ""
  }
}
