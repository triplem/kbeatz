catalog {
  # JDBC connection URL. Defaults to a file-based H2 database.
  # Override with CATALOG_JDBC_URL for PostgreSQL in production.
  jdbcUrl    = "jdbc:h2:file:./data/kbeatz;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
  jdbcUrl    = ${?CATALOG_JDBC_URL}

  # Database username. Default is the H2 SA user.
  dbUser     = "sa"
  dbUser     = ${?CATALOG_DB_USER}

  # Database password. Empty by default (H2 SA has no password).
  dbPassword = ""
  dbPassword = ${?CATALOG_DB_PASSWORD}

  # Absolute path to the FLAC library root on the host filesystem.
  # The service refuses to start when this is empty.
  libraryRoot = ""
  libraryRoot = ${?CATALOG_LIBRARY_ROOT}

  # Directory used for runtime data (image quota tracking, etc.).
  dataDir    = "./data"
  dataDir    = ${?CATALOG_DATA_DIR}

  repair {
    # Maximum seconds the startup write-lock repair scan may run before the
    # service logs an error and continues startup with unrepaired directories.
    # Unrepaired albums will be re-indexed on the next POST /api/v1/library/scan.
    timeoutSeconds = 60
    timeoutSeconds = ${?CATALOG_REPAIR_TIMEOUT_SECONDS}
  }

  discogs {
    # Personal Access Token for Discogs API access.
    # When absent, Discogs sync is unavailable but the service starts normally.
    token              = ""
    token              = ${?DISCOGS_TOKEN}

    # Maximum Discogs API requests per minute (Discogs limit: 60/min).
    rateLimitPerMinute = 60

    # Maximum cover-art images downloaded per day.
    imageDailyQuota    = 1000
  }
}

# Allow local developer overrides without touching application.conf.
# Create src/main/resources/local.conf (gitignored) to activate overrides.
include "local.conf"
