<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1828" />
    <title>kbeatz</title>
    <link rel="icon" type="image/svg+xml" href="/kbeatz-icon.svg" />
    <link rel="alternate icon" type="image/png" href="/kbeatz-icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <!--
      Content-Security-Policy for the inline no-flash theme script below.
      The script is allowed by its SHA-256 hash (script-src), NOT by
      'unsafe-inline'. The hash placeholder is replaced at build time by the
      csp-theme-script-hash Vite plugin so it always matches the final bytes.
      'unsafe-inline' on style-src is required by MUI/emotion's runtime <style>
      injection.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' '__INLINE_THEME_SCRIPT_HASH__'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'"
    />
    <!--
      No-flash theme bootstrap. Runs before the bundle so the correct colour
      scheme is applied before any theme-dependent UI renders. Mirrors
      src/theme/theme-storage.ts: read 'kbeatz-theme', accept only
      'light'|'dark', otherwise follow prefers-color-scheme.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('kbeatz-theme');
          var scheme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-mui-color-scheme', scheme);
        } catch (e) {
          document.documentElement.setAttribute('data-mui-color-scheme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
