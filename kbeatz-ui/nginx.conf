server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (OWASP A05 - Security Misconfiguration)
    # X-Frame-Options: prevent clickjacking by disallowing framing from any origin
    add_header X-Frame-Options "DENY" always;
    # X-Content-Type-Options: prevent MIME sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: send origin only on same-origin requests; omit on cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy: restrict resource origins to self; allow API calls to
    # the kbeatz-catalog service. connect-src includes http://localhost:8080 for local
    # development and the Docker Compose network alias (catalog:8080 via /api/ proxy).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' http://localhost:8080" always;
    # Permissions-Policy: opt out of browser features not used by this SPA
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Proxy API calls to catalog service
    location /api/ {
        proxy_pass http://catalog:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback - serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
