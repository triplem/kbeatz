server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (OWASP A05 - Security Misconfiguration).
    # 'always' ensures every header is emitted on error responses (4xx/5xx) too,
    # not just 2xx/3xx. These headers are set at server scope; the location
    # blocks below do NOT define their own add_header directives, so per nginx
    # inheritance rules they all inherit these server-scope headers.
    #
    # X-Frame-Options: legacy clickjacking defence for older browsers. Modern
    # browsers honour CSP frame-ancestors (below) instead, but we keep both.
    add_header X-Frame-Options "DENY" always;
    # X-Content-Type-Options: prevent MIME sniffing attacks.
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: never leak the URL (which may contain album/library paths)
    # in the Referer header on any navigation, same-origin or cross-origin.
    add_header Referrer-Policy "no-referrer" always;
    # Content-Security-Policy (response header): this header carries ONLY the
    # frame-ancestors directive, which is the modern clickjacking defence and is
    # IGNORED when delivered via a <meta http-equiv> tag - so it MUST be a real
    # HTTP header. We deliberately do NOT repeat script-src/default-src/etc. here.
    #
    # Why: the precise resource policy (script-src, style-src, ...) lives in the
    # index.html <meta> CSP, where the inline no-flash theme script is allowed by
    # a per-build SHA-256 hash injected by the csp-theme-script-hash Vite plugin.
    # Browsers enforce the INTERSECTION of all delivered CSPs, so if this static
    # nginx header also declared script-src 'self' (no hash), the combined policy
    # would BLOCK the hashed inline theme script. Declaring only frame-ancestors
    # here composes cleanly with the meta CSP: a policy with no script-src and no
    # default-src imposes no restriction on scripts, so the meta CSP remains the
    # sole, authoritative arbiter of script execution and is not weakened.
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    # Permissions-Policy: opt out of browser features not used by this SPA.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Proxy API calls to catalog service
    location /api/ {
        proxy_pass http://catalog:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback - serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
