name: Publish

# This workflow publishes continuous, per-commit Docker images to GHCR on every
# push to main. Library JAR publishing is intentionally NOT done here: it is
# handled by release.yml, which is gated on a semantic-release version bump and
# stamps the real semver version into the build files before publishing.
#
# Publishing JARs on every push (as this workflow previously did) used the
# hardcoded version 0.0.1 and failed with HTTP 409 Conflict because that release
# version already exists in GitHub Packages and cannot be overwritten. JAR
# publishing now occurs only on a semver release via release.yml.

on:
  push:
    branches: [main]

# Prevent concurrent publish runs on the same branch. If a new push arrives
# while a publish is in progress, cancel the older run to keep artifacts
# consistent with the latest commit.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-docker:
    name: Push Docker images to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract version from kbeatz-catalog build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -m1 '^version\s*=' kbeatz-catalog/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push kbeatz-catalog image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: kbeatz-catalog/Dockerfile
          push: true
          # Tag with commit SHA (immutable) and version (mutable, points to latest of that version).
          # :latest is intentionally omitted; use the SHA tag for pinned references.
          tags: |
            ghcr.io/triplem/kbeatz-catalog:${{ github.sha }}
            ghcr.io/triplem/kbeatz-catalog:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/triplem/kbeatz
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Extract version from kbeatz-cli build.gradle.kts
        id: cli-version
        run: |
          VERSION=$(grep -m1 '^version\s*=' kbeatz-cli/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push kbeatz-cli image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: kbeatz-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/triplem/kbeatz-cli:${{ github.sha }}
            ghcr.io/triplem/kbeatz-cli:${{ steps.cli-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/triplem/kbeatz
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.cli-version.outputs.version }}
