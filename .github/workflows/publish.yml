name: Publish

on:
  push:
    branches: [main]

# Prevent concurrent publish runs on the same branch. If a new push arrives
# while a publish is in progress, cancel the older run to keep artifacts
# consistent with the latest commit.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-jars:
    name: Publish JARs to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create test directories
        run: mkdir -p /tmp/kbeatz-test-library /tmp/kbeatz-test-data

      - name: Build and verify all modules
        run: ./gradlew buildBackends check --no-daemon --no-parallel
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library
          DATA_DIR: /tmp/kbeatz-test-data

      - name: Publish library JARs and fat JAR to GitHub Packages
        # Publishes kbeatz-common, kbeatz-sources, kbeatz-tagger (library JARs)
        # and kbeatz-cli (shadow/fat JAR) to the GitHub Packages Maven registry.
        # kbeatz-catalog is a runnable service and is published as a Docker image only.
        run: |
          ./gradlew \
            :kbeatz-common:publish \
            :kbeatz-sources:publish \
            :kbeatz-tagger:publish \
            :kbeatz-cli:publish \
            --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Push Docker images to GHCR
    runs-on: ubuntu-latest
    needs: publish-jars

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from kbeatz-catalog build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -m1 '^version\s*=' kbeatz-catalog/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push kbeatz-catalog image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: kbeatz-catalog/Dockerfile
          push: true
          # Tag with commit SHA (immutable) and version (mutable, points to latest of that version).
          # :latest is intentionally omitted; use the SHA tag for pinned references.
          tags: |
            ghcr.io/triplem/kbeatz-catalog:${{ github.sha }}
            ghcr.io/triplem/kbeatz-catalog:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/triplem/kbeatz
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Extract version from kbeatz-cli build.gradle.kts
        id: cli-version
        run: |
          VERSION=$(grep -m1 '^version\s*=' kbeatz-cli/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push kbeatz-cli image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: kbeatz-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/triplem/kbeatz-cli:${{ github.sha }}
            ghcr.io/triplem/kbeatz-cli:${{ steps.cli-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/triplem/kbeatz
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.cli-version.outputs.version }}
