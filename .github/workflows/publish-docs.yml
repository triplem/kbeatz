name: Publish Quality Reports

on:
  push:
    branches: [main]

# Prevent concurrent publish runs. If a new push arrives while publish is in
# progress, cancel the older run so the site always reflects the latest commit.
concurrency:
  group: publish-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build-detekt:
    name: Generate Detekt HTML reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create test directories
        run: mkdir -p /tmp/kbeatz-test-library /tmp/kbeatz-test-data

      - name: Run check (builds Detekt HTML reports)
        run: ./gradlew buildBackends check --no-daemon --no-parallel
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library
          DATA_DIR: /tmp/kbeatz-test-data

      - name: Collect Detekt HTML reports
        run: |
          mkdir -p detekt-reports
          for module in kbeatz-catalog kbeatz-cli kbeatz-common kbeatz-sources kbeatz-tagger; do
            # The check task runs the base :detekt task (not :detektMain), which
            # outputs detekt.html. The :detektMain task (producing main.html) is
            # not wired into the check task graph in this project.
            report="$module/build/reports/detekt/detekt.html"
            if [ -f "$report" ]; then
              cp "$report" "detekt-reports/${module}.html"
            fi
          done

      - name: Upload Detekt reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detekt-reports
          path: detekt-reports/
          retention-days: 1
          # Fail the job immediately if no reports were collected; this surfaces
          # path issues early instead of silently uploading an empty artifact that
          # causes the downstream download step to fail with a confusing error.
          if-no-files-found: error

  build-eslint:
    name: Generate ESLint HTML report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: kbeatz-ui/package-lock.json

      - name: Install dependencies
        working-directory: kbeatz-ui
        run: npm ci

      - name: Generate ESLint HTML report
        working-directory: kbeatz-ui
        # Continue on lint warnings/errors so the report is still published.
        # The CI job (ci.yml) enforces zero warnings; here we only collect the report.
        run: |
          npx eslint . --ext ts,tsx --report-unused-disable-directives \
            --format html --output-file ../eslint-report.html || true

      - name: Upload ESLint report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eslint-report
          path: eslint-report.html
          retention-days: 1

  scan-trivy:
    name: Trivy container scan (HTML report)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # If the image is not yet published the scan step is skipped gracefully.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Extract catalog version
        id: version
        run: |
          VERSION=$(grep -m1 '^version\s*=' kbeatz-catalog/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull catalog image
        id: pull
        run: |
          IMAGE="ghcr.io/triplem/kbeatz-catalog:${{ steps.version.outputs.version }}"
          if docker pull "$IMAGE" 2>/dev/null; then
            echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Trivy HTML template
        if: steps.pull.outputs.available == 'true'
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/aquasecurity/trivy/v0.71.0/contrib/html.tpl" \
            -o /tmp/trivy-html.tpl

      - name: Run Trivy image scan (HTML)
        if: steps.pull.outputs.available == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.pull.outputs.image }}
          format: 'template'
          template: '@/tmp/trivy-html.tpl'
          output: 'trivy-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          version: 'v0.71.0'

      - name: Upload Trivy report
        if: steps.pull.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report
          path: trivy-report.html
          retention-days: 1

  publish:
    name: Publish quality reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-detekt, build-eslint, scan-trivy]
    # Publish even if Trivy scan was skipped (image not yet on GHCR).
    # Fail only if the two mandatory build jobs failed.
    if: always() && needs.build-detekt.result == 'success' && needs.build-eslint.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download Detekt reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detekt-reports
          path: site/reports/detekt/

      - name: Download ESLint report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: eslint-report
          path: site/reports/eslint/

      - name: Download Trivy report (optional)
        id: trivy-download
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: trivy-report
          path: site/reports/trivy/
        continue-on-error: true

      - name: Build quality reports index
        run: |
          TRIVY_LINK=""
          TRIVY_STATUS=""
          if [ "${{ steps.trivy-download.outcome }}" = "success" ] && ls site/reports/trivy/*.html 1>/dev/null 2>&1; then
            TRIVY_LINK='<li><a href="trivy/trivy-report.html">Trivy Container Scan Report</a></li>'
          else
            TRIVY_STATUS='<p class="placeholder">Trivy container scan report is not yet available. It will appear once the Docker image is published to GHCR.</p>'
          fi

          DETEKT_LINKS=""
          for module in kbeatz-catalog kbeatz-cli kbeatz-common kbeatz-sources kbeatz-tagger; do
            if [ -f "site/reports/detekt/${module}.html" ]; then
              DETEKT_LINKS="${DETEKT_LINKS}<li><a href=\"detekt/${module}.html\">${module}</a></li>"
            fi
          done

          mkdir -p site/reports
          cat > site/reports/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>kbeatz - Quality Reports</title>
            <style>
              body { font-family: Arial, Helvetica, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
              h1 { border-bottom: 2px solid #0066cc; padding-bottom: 8px; }
              h2 { margin-top: 32px; color: #0066cc; }
              ul { line-height: 1.8; }
              a { color: #0066cc; }
              .placeholder { background: #fff3cd; border: 1px solid #ffc107; padding: 12px 16px; border-radius: 4px; }
              footer { margin-top: 48px; font-size: 0.85em; color: #666; border-top: 1px solid #ddd; padding-top: 12px; }
            </style>
          </head>
          <body>
            <h1>kbeatz - Quality Reports</h1>
            <p>Published from the <code>main</code> branch on every push.</p>
            <p>Return to the <a href="../index.html">documentation index</a>.</p>

            <h2>Quality Reports</h2>

            <h3>Detekt - Static Analysis (Kotlin)</h3>
            <ul id="detekt-list">DETEKT_LINKS_PLACEHOLDER</ul>

            <h3>ESLint - Static Analysis (TypeScript / React)</h3>
            <ul>
              <li><a href="eslint/eslint-report.html">ESLint Report</a></li>
            </ul>

            <h3>Trivy - Container Security Scan</h3>
            <ul id="trivy-list">TRIVY_LINK_PLACEHOLDER</ul>
            TRIVY_STATUS_PLACEHOLDER

            <footer>
              Generated by GitHub Actions &bull; <a href="https://github.com/triplem/kbeatz">triplem/kbeatz</a>
            </footer>
          </body>
          </html>
          HTMLEOF

          ESCAPED_DETEKT=$(printf '%s\n' "$DETEKT_LINKS" | sed 's/[&/\]/\\&/g; s/$/\\n/' | tr -d '\n')
          ESCAPED_TRIVY=$(printf '%s\n' "$TRIVY_LINK" | sed 's/[&/\]/\\&/g; s/$/\\n/' | tr -d '\n')
          ESCAPED_STATUS=$(printf '%s\n' "$TRIVY_STATUS" | sed 's/[&/\]/\\&/g; s/$/\\n/' | tr -d '\n')

          sed -i "s|DETEKT_LINKS_PLACEHOLDER|${ESCAPED_DETEKT}|g" site/reports/index.html
          sed -i "s|TRIVY_LINK_PLACEHOLDER|${ESCAPED_TRIVY}|g" site/reports/index.html
          sed -i "s|TRIVY_STATUS_PLACEHOLDER|${ESCAPED_STATUS}|g" site/reports/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          commit_message: "ci(scaffold): publish quality reports from ${{ github.sha }}"
