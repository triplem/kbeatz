name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build, test, and verify backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create test directories
        run: mkdir -p /tmp/kbeatz-test-library /tmp/kbeatz-test-data

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-cache-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: nvd-cache-
        # Required secret: NVD_API_KEY (repo setting). Without it, NVD rate-limits
        # anonymous requests and the first DB download can take 10-20 minutes.
        # Obtain a free API key at https://nvd.nist.gov/developers/request-an-api-key.

      - name: Build backends and run quality gates
        run: ./gradlew buildBackends check --no-daemon --no-parallel
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library
          DATA_DIR: /tmp/kbeatz-test-data
        # Note: kbeatz-catalog:check already depends on e2eTest (via kbeatz.ktor-service
        # convention plugin). The explicit e2eTest step below makes this visible in the
        # CI job summary and allows targeted re-runs without re-running all checks.

      - name: Run OWASP Dependency Check
        run: |
          for module in kbeatz-common kbeatz-tagger kbeatz-sources kbeatz-catalog kbeatz-cli; do
            echo "--- dependencyCheckAnalyze: $module ---"
            (cd "$module" && ../gradlew dependencyCheckAnalyze --no-daemon)
          done
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          # Each module runs as its own Gradle root (composite build) so the root
          # gradle.properties -Xmx2g is not inherited. GRADLE_OPTS ensures the JVM
          # has enough heap to buffer the NVD database download.
          GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
        # Fails build on HIGH/CRITICAL CVEs (CVSS >= 7.0). NVD database is cached via
        # the "Cache NVD database" step above. Suppressions for accepted false positives
        # go in <module>/config/dependency-check/suppressions.xml with a documented rationale.
        # Each includeBuild module is its own Gradle root, so the task must run per module.
        # project.rootDir resolves to the module directory in a composite build, so each
        # module carries its own suppressions.xml copy (mirrors the detekt.yml pattern).

      - name: Run E2E tests
        run: ./gradlew :kbeatz-catalog:e2eTest --no-daemon
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library
          DATA_DIR: /tmp/kbeatz-test-data
          CATALOG_JDBC_URL: jdbc:h2:mem:kbeatz_e2e;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        # E2E tests use Ktor's testApplication {} in-process engine — no real server
        # is started. Tests cover path traversal prevention, album listing contract,
        # library scan trigger/status, and X-Trace-Id header propagation.

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Build, lint, and test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: kbeatz-ui/package-lock.json

      - name: Install dependencies
        working-directory: kbeatz-ui
        run: npm ci

      - name: Audit npm dependencies
        working-directory: kbeatz-ui
        run: npm audit --audit-level=high --omit=dev
        # Audits production dependencies only. Dev-only tools (vitest, eslint, etc.)
        # are excluded because they never ship to users and their CVEs (e.g. vitest
        # UI server path traversal) do not apply to production workloads.
        # To accept a production CVE false-positive, document the reason in
        # docs/security/accepted-risks.md and add an npm audit override to package.json.

      - name: Lint
        working-directory: kbeatz-ui
        run: npm run lint

      - name: Build (TypeScript strict mode)
        working-directory: kbeatz-ui
        run: npm run build

      - name: Test
        working-directory: kbeatz-ui
        run: npm run test
