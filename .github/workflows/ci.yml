name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build, test, and verify backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create test library directory
        run: mkdir -p /tmp/kbeatz-test-library

      - name: Build backends and run quality gates
        run: ./gradlew buildBackends check --no-daemon --no-parallel
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Build, lint, and test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: kbeatz-ui/package-lock.json

      - name: Install dependencies
        working-directory: kbeatz-ui
        run: npm ci

      - name: Lint
        working-directory: kbeatz-ui
        run: npm run lint

      - name: Build (TypeScript strict mode)
        working-directory: kbeatz-ui
        run: npm run build

      - name: Test
        working-directory: kbeatz-ui
        run: npm run test
