name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build, test, and verify backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create test library directory
        run: mkdir -p /tmp/kbeatz-test-library

      - name: Build backends and run quality gates
        run: ./gradlew buildBackends check --no-daemon --no-parallel
        env:
          CATALOG_LIBRARY_ROOT: /tmp/kbeatz-test-library
        # TODO(#167): OWASP Dependency Check (./gradlew dependencyCheckAnalyze) is not yet
        # configured. The org.owasp.dependencycheck Gradle plugin is absent from build-logic/
        # and all build.gradle.kts files. Adding it without a pre-seeded NVD cache causes a
        # 10-20 min first-run download that makes CI unusable. Track this as a MAJOR gap:
        # add the plugin with GitHub Actions cache for ~/.gradle/dependency-check-data/ before
        # enabling the task here.

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Build, lint, and test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: kbeatz-ui/package-lock.json

      - name: Install dependencies
        working-directory: kbeatz-ui
        run: npm ci

      - name: Lint
        working-directory: kbeatz-ui
        run: npm run lint

      - name: Build (TypeScript strict mode)
        working-directory: kbeatz-ui
        run: npm run build

      - name: Test
        working-directory: kbeatz-ui
        run: npm run test

      - name: Audit npm dependencies
        working-directory: kbeatz-ui
        run: npm audit --audit-level=high
        # Fails the job when any HIGH or CRITICAL CVE is found in transitive dependencies.
        # To accept a specific false-positive, add it to .npmrc with audit-level overrides
        # and document the reason in docs/security/accepted-risks.md.
