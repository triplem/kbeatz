name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Determine version and publish release
    runs-on: ubuntu-latest
    # Skip if the push is itself a version-bump commit to avoid infinite loops.
    if: "!startsWith(github.event.head_commit.message, 'chore(scaffold): bump version to')"

    steps:
      - name: Checkout (full history for tag detection)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # RELEASE_TOKEN must be a PAT with repo scope belonging to the repository
          # owner. It is required so the version-bump commit can be pushed directly
          # to the protected main branch (GITHUB_TOKEN cannot bypass branch
          # protection on personal repositories). Create a classic PAT at
          # https://github.com/settings/tokens and add it as a repository secret
          # named RELEASE_TOKEN under Settings > Secrets and variables > Actions.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/release.sh
