name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Determine version and publish release
    runs-on: ubuntu-latest
    # Skip if the push is itself a version-bump commit to avoid infinite loops.
    if: "!startsWith(github.event.head_commit.message, 'chore(scaffold): bump version to')"

    steps:
      - name: Checkout (full history for tag detection)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/release.sh
